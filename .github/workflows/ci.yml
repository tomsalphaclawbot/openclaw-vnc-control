name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests (no VNC required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run unit tests (VNC-skip-safe)
        env:
          VNC_HOST: ""
          VNC_PORT: ""
          VNC_USERNAME: ""
          VNC_PASSWORD: ""
        run: |
          pytest tests/test_unit.py tests/test_workflow.py -v --timeout=30
