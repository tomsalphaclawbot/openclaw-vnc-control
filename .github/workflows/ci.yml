name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests (no VNC required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run unit tests (VNC-skip-safe)
        env:
          VNC_HOST: ""
          VNC_PORT: ""
          VNC_USERNAME: ""
          VNC_PASSWORD: ""
        run: |
          pytest tests/test_unit.py -v --timeout=30

  integration-tests:
    name: Integration Tests (VNC required)
    runs-on: ubuntu-latest
    # Only runs when VNC_HOST secret is configured
    if: ${{ secrets.VNC_HOST != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run integration tests
        env:
          VNC_HOST: ${{ secrets.VNC_HOST }}
          VNC_PORT: ${{ secrets.VNC_PORT }}
          VNC_USERNAME: ${{ secrets.VNC_USERNAME }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          pytest tests/test_integration.py -v --timeout=60
